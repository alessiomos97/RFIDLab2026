<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>GS1 Digital Link Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      line-height: 1.5;
    }

    .box {
      max-width: 700px;
      padding: 24px;
      border: 1px solid #ddd;
      border-radius: 12px;
    }

    .label {
      font-size: 14px;
      color: #666;
      margin-bottom: 4px;
    }

    .serial {
      font-size: 32px;
      font-weight: bold;
      color: #111;
      margin-bottom: 24px;
    }

    .small {
      font-size: 14px;
      color: #555;
      word-break: break-all;
      margin-bottom: 16px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>GS1 Digital Link Demo</h1>

    <p class="label">Serial Number</p>
    <div class="serial" id="serial">---</div>

    <p class="label">GTIN</p>
    <div class="small" id="gtin">---</div>

    <p class="label">URL ricevuto</p>
    <div class="small" id="url">---</div>
  </div>

  <script>
    const pathParts = window.location.pathname.split("/").filter(Boolean);

    /*
      Con GitHub Pages il path contiene anche il nome del repository:
      /RFIDLab2026/01/08012345678901/21/GROUP01

      Quindi cerchiamo direttamente gli Application Identifier GS1:
      01 = GTIN
      21 = Serial Number
    */

    const index01 = pathParts.indexOf("01");
    const index21 = pathParts.indexOf("21");

    const gtin = index01 !== -1 ? pathParts[index01 + 1] : null;
    const serial = index21 !== -1 ? pathParts[index21 + 1] : null;

    document.getElementById("gtin").textContent =
      gtin ? decodeURIComponent(gtin) : "GTIN non trovato";

    document.getElementById("serial").textContent =
      serial ? decodeURIComponent(serial) : "Serial Number non trovato";

    document.getElementById("url").textContent = window.location.href;
  </script>
</body>
</html>
